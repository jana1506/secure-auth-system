<!DOCTYPE html>
<html>
<head>
  <title>Login 🌸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(255,105,180,0.3);
      width: 400px;
      text-align: center;
    }
    h1 { color: #ff69b4; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #ffb6c1;
      border-radius: 10px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover { background: #ff1493; }
    #step2 { display: none; margin-top: 20px; }
    .link { color: #ff69b4; text-decoration: none; margin-top: 15px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌸 Login</h1>
    <div id="step1">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>
    <div id="step2">
      <p>Enter 2FA code:</p>
      <input type="text" id="code" placeholder="6-digit code" maxlength="6">
      <button onclick="verify2FA()">Verify</button>
    </div>
    <a class="link" href="register.html">Create an account</a>
  </div>

  <script>
    let tempToken = '';
    async function login() {
      const data = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      };
      const res = await fetch('/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (result.tempToken) {
        tempToken = result.tempToken;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
      }
      alert(result.message || result.error);
    }
    async function verify2FA() {
      const data = {
        tempToken: tempToken,
        code: document.getElementById('code').value
      };
      const res = await fetch('/auth/verify-2fa', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (result.token) {
        localStorage.setItem('token', result.token);
        window.location.href = 'dashboard.html';
      }
      alert(result.message || result.error);
    }
  </script>
</body>
</html>
