<!DOCTYPE html>
<html>
<head>
  <title>Register 🌸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #ffe6f0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(255,105,180,0.3);
      width: 400px;
      text-align: center;
    }
    h1 { color: #ff69b4; margin-bottom: 20px; }
    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 2px solid #ffb6c1;
      border-radius: 10px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #ff69b4;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover { background: #ff1493; }
    #qrBox { margin-top: 20px; }
    #qrBox img { width: 200px; }
    .link { color: #ff69b4; text-decoration: none; margin-top: 15px; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🌸 Register</h1>
    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <select id="role">
      <option value="user">User</option>
      <option value="manager">Manager</option>
      <option value="admin">Admin</option>
    </select>
    <button onclick="register()">Register</button>
    <div id="qrBox"></div>
    <a class="link" href="login.html">Already registered? Login</a>
  </div>

  <script>
    async function register() {
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: document.getElementById('role').value
      };
      const res = await fetch('/auth/register', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (result.qrCode) {
        document.getElementById('qrBox').innerHTML = '<p>Scan this QR code:</p><img src="' + result.qrCode + '">';
      }
      alert(result.message || result.error);
    }
  </script>
</body>
</html>
